version: "1.0.0"
platform: codex-cli

interface:
  display_name: "Clean Apex"
  short_description: "Readable, layered Apex clean-code guidance"
  default_prompt: "Use clean-apex to review and refactor this Apex code for naming, layering, DI, and test boundaries."

hooks:
  enabled: auto-detect
  post_tool_use:
    - matcher: "Write|Edit"
      command: "python3 ${SKILL_HOOKS}/clean-apex-validate.py"
      timeout: 15000
      mode: advisory
  fallback: manual
  manual_command: 'echo ''{"tool_input":{"file_path":"path/to/file.cls"}}'' | python3 hooks/scripts/clean-apex-validate.py'

references:
  auto_load: false
  load_on_demand: true
  directory: "references/"

templates:
  directory: "templates/"
  index: "templates/TEMPLATE_INDEX.md"

validation:
  enabled: true
  mode: advisory
  suppression_supported: true
  manual_instructions: |
    If hooks are not available, validate files manually:
    echo '{"tool_input":{"file_path":"YOUR_FILE.cls"}}' | python3 hooks/scripts/clean-apex-validate.py

capabilities:
  - code_review
  - code_generation
  - validation
  - architecture_guidance
  - template_based_generation

settings:
  strict_mode: false
  auto_fix: false
  report_format: "human_readable"
