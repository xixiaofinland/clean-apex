version: "1.0.0"
platform: claude-code

interface:
  display_name: "Clean Apex"
  short_description: "Readable, layered Apex clean-code guidance"
  default_prompt: "Use clean-apex to review and refactor this Apex code for naming, layering, DI, and test boundaries."

hooks:
  enabled: true
  post_tool_use:
    - matcher: "Write|Edit"
      command: "python3 ${SKILL_HOOKS}/clean-apex-validate.py"
      timeout: 15000
      mode: advisory
  on_error: advisory

references:
  auto_load: true
  priority:
    - "references/architecture.md"
    - "references/naming-conventions.md"
    - "references/soql-di.md"
    - "references/error-handling.md"
    - "references/validator-exceptions.md"

templates:
  directory: "templates/"
  index: "templates/TEMPLATE_INDEX.md"

validation:
  enabled: true
  mode: advisory
  suppression_supported: true

capabilities:
  - code_review
  - code_generation
  - validation
  - architecture_guidance
  - template_based_generation

settings:
  strict_mode: false
  auto_fix: false
  report_format: "human_readable"
