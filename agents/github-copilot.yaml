version: "1.0.0"
platform: github-copilot

# GitHub Copilot Agent Skills schema
agent_skill:
  name: "clean-apex"
  version: "1.0.0"
  description: "Clean-code focused Apex guidance for readability, naming conventions, 3-tier architecture (entry-point, static service, OO), error handling, and unit vs integration testing."
  author: "Xi Xiao"

interface:
  display_name: "Clean Apex"
  short_description: "Readable, layered Apex clean-code guidance"
  keywords:
    - apex
    - salesforce
    - clean-code
    - architecture
    - testing

hooks:
  enabled: auto-detect
  fallback: manual
  manual_command: 'echo ''{"tool_input":{"file_path":"path/to/file.cls"}}'' | python3 hooks/scripts/clean-apex-validate.py'

resources:
  references: "references/"
  templates: "templates/"
  examples: "examples-sanitized/"
  index: "templates/TEMPLATE_INDEX.md"

validation:
  enabled: true
  mode: advisory
  suppression_supported: true
  manual_instructions: |
    For manual validation without hooks:
    1. Save your Apex file
    2. Run: echo '{"tool_input":{"file_path":"YOUR_FILE.cls"}}' | python3 hooks/scripts/clean-apex-validate.py
    3. Review advisory feedback

capabilities:
  code_review:
    description: "Review Apex code for clean-code compliance"
    layers: ["entry-point", "service", "oo", "selector", "test"]
  code_generation:
    description: "Generate Apex code from templates"
    templates: "templates/TEMPLATE_INDEX.md"
  validation:
    description: "Automated validation of Apex clean-code rules"
    rules: "references/validator-exceptions.md"
  architecture_guidance:
    description: "3-tier architecture guidance and refactoring"
    reference: "references/architecture.md"

settings:
  strict_mode: false
  auto_fix: false
  report_format: "human_readable"
