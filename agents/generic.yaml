version: "1.0.0"
platform: generic

# Generic fallback configuration for unknown or custom agent platforms
# This provides minimal configuration that should work across most platforms

interface:
  display_name: "Clean Apex"
  short_description: "Readable, layered Apex clean-code guidance"
  default_prompt: "Use clean-apex to review and refactor this Apex code for naming, layering, DI, and test boundaries."

documentation:
  readme: "README.md"
  skill_definition: "SKILL.md"
  references: "references/"
  templates: "templates/"
  examples: "examples-sanitized/"
  changelog: "CHANGELOG.md"
  glossary: "GLOSSARY.md"

quick_start:
  - "Read SKILL.md for core skill instructions"
  - "Review references/README.md for guided reading order"
  - "Browse templates/TEMPLATE_INDEX.md for code generation"
  - "Run validator manually: echo '{\"tool_input\":{\"file_path\":\"YOUR_FILE.cls\"}}' | python3 hooks/scripts/clean-apex-validate.py"

validation:
  mode: manual
  instructions: |
    Automated hooks may not be available on this platform.
    To validate Apex files manually:

    1. Ensure Python 3.7+ is installed
    2. Navigate to the skill directory
    3. Run the validator:
       echo '{"tool_input":{"file_path":"path/to/YourClass.cls"}}' | python3 hooks/scripts/clean-apex-validate.py

    The validator provides advisory feedback and does not block file operations.

  suppression_supported: true
  suppression_syntax: "// clean-apex: allow=RULE_CODE"

references:
  load_instructions: |
    Before working with Apex code, manually load these references:
    - references/architecture.md - 3-tier architecture principles
    - references/naming-conventions.md - Naming patterns and role suffixes
    - references/soql-di.md - SOQL isolation and dependency injection
    - references/error-handling.md - Exception propagation patterns
    - references/validator-exceptions.md - Validator rule codes

    See references/README.md for reading order guidance.

templates:
  location: "templates/"
  index: "templates/TEMPLATE_INDEX.md"
  usage: |
    1. Browse templates/TEMPLATE_INDEX.md to find appropriate templates
    2. Copy template content
    3. Replace "CleanOrder" with your entity name
    4. Customize fields and logic
    5. Validate with the manual validator command

capabilities:
  - code_review
  - code_generation
  - validation
  - architecture_guidance
  - template_based_generation

settings:
  strict_mode: false
  auto_fix: false
  report_format: "human_readable"

support:
  issues: "https://github.com/anthropics/claude-code/issues"
  documentation: "README.md"
